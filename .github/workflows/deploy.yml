name: Deploy to Azure Container Apps
on:
  push:
    branches: [ main ]
permissions:
  id-token: write
  contents: read
env:
  ACR_NAME: acrdglee0412
  IMAGE_NAME: todo-app
  RESOURCE_GROUP: rg-todo
  CONTAINER_APP: app-todo
  CONTAINER_ENV: env-deploy-test

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and push image
        run: |
          docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} -f TodoApi/Dockerfile TodoApi
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}

      - name: Deploy to Container Apps
        run: |
          az containerapp up \
            --name $CONTAINER_APP \
            --resource-group $RESOURCE_GROUP \
            --environment $CONTAINER_ENV \
            --image $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} \
            --target-port 8080 \
            --ingress external \
            --registry-server $ACR_NAME.azurecr.io
